// ==================== SOUND SYSTEM ====================
var audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playNote(freq,dur,type,vol,delay){
  try{var c=getCtx(),o=c.createOscillator(),g=c.createGain();
  o.type=type||"sine";o.frequency.value=freq;g.gain.value=vol||0.15;
  o.connect(g);g.connect(c.destination);
  var t=c.currentTime+(delay||0);
  o.start(t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.stop(t+dur);}catch(e){}
}

// ==================== SPEECH SYNTHESIS ====================
function speak(text){
  try{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang="ja-JP";u.rate=0.85;u.pitch=1.2;u.volume=0.9;
    // Try to find Japanese voice
    var voices=window.speechSynthesis.getVoices();
    var jpVoice=voices.find(function(v){return v.lang.startsWith("ja");});
    if(jpVoice)u.voice=jpVoice;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
// Preload voices
if(typeof window!=="undefined"&&window.speechSynthesis){
  window.speechSynthesis.getVoices();
  if(window.speechSynthesis.onvoiceschanged!==undefined){window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};}
}

function ds(d){var x=d||new Date();return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");}
function daysLeft(){var n=new Date(),t=new Date(n.getFullYear(),n.getMonth(),n.getDate());return Math.ceil((EXAM_DATE-t)/864e5);}
function streakBonus(s){return s>=30?3:s>=7?2:s>=3?1:0;}
function pick(col){
  var ids=new Set(col.map(function(c){return c.id;}));
  var av=CREATURES.filter(function(c){return !ids.has(c.id);});
  if(!av.length)return CREATURES[Math.floor(Math.random()*CREATURES.length)];
  var w=av.map(function(c){return c.rarity===1?5:c.rarity===2?3:1;});
  var tot=w.reduce(function(a,b){return a+b;},0),r=Math.random()*tot;
  for(var i=0;i<av.length;i++){r-=w[i];if(r<=0)return av[i];}return av[0];
}
async function load(){
  try{
    var r=lsGet("tamago-v5");
    if(r&&r.value)return JSON.parse(r.value);
  }catch(e){}
  // Try migrating from older versions (v4, v3, v2, v1)
  var oldKeys=["tamago-v4","tamago-v3","tamago-v2","tamago-v1"];
  for(var ki=0;ki<oldKeys.length;ki++){
    try{
      var old=lsGet(oldKeys[ki]);
      if(old&&old.value){
        var d=JSON.parse(old.value);
        d=migrateFields(d);
        lsSet("tamago-v5",JSON.stringify(d));
        return d;
      }
    }catch(e){}
  }
  // Fallback: try localStorage (PWA / direct browser use)
  if(typeof localStorage!=="undefined"){
    var lsKeys=["tamago-v5","tamago-v4","tamago-v3","tamago-v2","tamago-v1"];
    for(var li=0;li<lsKeys.length;li++){
      try{
        var ls=localStorage.getItem(lsKeys[li]);
        if(ls){
          var ld=JSON.parse(ls);
          ld=migrateFields(ld);
          lsSet("tamago-v5",JSON.stringify(ld));
          return ld;
        }
      }catch(e){}
    }
  }
  return null;
}

function migrateFields(d){
  if(!d.presets)d.presets=DEFAULT_PRESETS;
  if(!d.todayTasks)d.todayTasks=[];
  if(!d.todayTasksDate)d.todayTasksDate=ds();
  if(!d.todayCompleted)d.todayCompleted=[];

  if(d.currentEggStamps===undefined)d.currentEggStamps=0;
  if(!d.currentCreature)d.currentCreature=pick(d.collected||[]);
  if(!d.currentEggTarget)d.currentEggTarget=d.currentCreature.cost;
  if(d.eggColorIndex===undefined)d.eggColorIndex=0;

function AnalogClock({now,timeStr}){
  var h=now.getHours()%12,m=now.getMinutes(),s=now.getSeconds();
  var hourDeg=(h*30)+(m*0.5);
  var minDeg=m*6;
  var secDeg=s*6;
  var size=120;
  var cx=size/2,cy=size/2,r=size/2-4;

  var nums=[];
  for(var i=1;i<=12;i++){
    var angle=(i*30-90)*(Math.PI/180);
    var nr=r-16;
    nums.push({n:i,x:cx+nr*Math.cos(angle),y:cy+nr*Math.sin(angle)});
  }
  var ticks=[];
  for(var t=0;t<60;t++){
    var ta=(t*6-90)*(Math.PI/180);
    var isMajor=t%5===0;
    ticks.push({x1:cx+(isMajor?r-10:r-6)*Math.cos(ta),y1:cy+(isMajor?r-10:r-6)*Math.sin(ta),x2:cx+(r-2)*Math.cos(ta),y2:cy+(r-2)*Math.sin(ta),major:isMajor});
  }
  function hand(deg,len){var a=(deg-90)*(Math.PI/180);return{x:cx+len*Math.cos(a),y:cy+len*Math.sin(a)};}
  var hEnd=hand(hourDeg,r*0.48),mEnd=hand(minDeg,r*0.68),sEnd=hand(secDeg,r*0.72);
  var hourColor="#FF6B35",minColor="#4A90D9",secColor="#E53935";

            <circle cx={cx} cy={cy} r={r-12} fill="none" stroke="rgba(0,0,0,0.04)" strokeWidth="1"/>
            {ticks.map(function(tk,idx){return <line key={idx} x1={tk.x1} y1={tk.y1} x2={tk.x2} y2={tk.y2} stroke={tk.major?"#555":"#ccc"} strokeWidth={tk.major?"2":"1"} strokeLinecap="round"/>;})}
            {nums.map(function(nm){var isKey=nm.n===12||nm.n===3||nm.n===6||nm.n===9;return <text key={nm.n} x={nm.x} y={nm.y} textAnchor="middle" dominantBaseline="central" fill={isKey?"#FF6B35":"#333"} fontSize={isKey?"15":"13"} fontWeight={isKey?"900":"700"} fontFamily="'Hiragino Maru Gothic Pro',sans-serif">{nm.n}</text>;})}
            <line x1={cx} y1={cy} x2={hEnd.x} y2={hEnd.y} stroke={hourColor} strokeWidth="4.5" strokeLinecap="round"/>
            <line x1={cx} y1={cy} x2={mEnd.x} y2={mEnd.y} stroke={minColor} strokeWidth="3" strokeLinecap="round"/>
            <line x1={cx} y1={cy} x2={sEnd.x} y2={sEnd.y} stroke={secColor} strokeWidth="1.5" strokeLinecap="round"/>

// ==================== EGG ====================
function Egg({stamps,target,colorIndex,onHatch}){
  var progress=Math.min(stamps/target,1);var color=EGG_COLORS[colorIndex%EGG_COLORS.length];var ready=progress>=1;
  var anim=ready?"shake-hard 0.3s infinite, glow-pulse 1s infinite":progress>0.8?"shake-hard 2s infinite":progress>0.5?"shake-medium 2s infinite":progress>0.2?"shake-soft 2s infinite":"egg-float 3s ease-in-out infinite";
  var cracks=[];
  if(progress>0.4)cracks.push(<div key="c1" style={{position:"absolute",top:"35%",left:"45%",width:"20px",height:"2px",background:"rgba(0,0,0,0.15)",transform:"rotate(30deg)",borderRadius:"2px"}}/>);
  if(progress>0.6){cracks.push(<div key="c2" style={{position:"absolute",top:"42%",left:"40%",width:"25px",height:"2px",background:"rgba(0,0,0,0.2)",transform:"rotate(-20deg)",borderRadius:"2px"}}/>);cracks.push(<div key="c3" style={{position:"absolute",top:"38%",left:"52%",width:"15px",height:"2px",background:"rgba(0,0,0,0.15)",transform:"rotate(60deg)",borderRadius:"2px"}}/>);}
  if(progress>0.8){cracks.push(<div key="c4" style={{position:"absolute",top:"30%",left:"35%",width:"30px",height:"2px",background:"rgba(0,0,0,0.25)",transform:"rotate(-45deg)",borderRadius:"2px"}}/>);cracks.push(<div key="c5" style={{position:"absolute",top:"45%",left:"55%",width:"18px",height:"2px",background:"rgba(0,0,0,0.2)",transform:"rotate(15deg)",borderRadius:"2px"}}/>);}
  return (
    <div style={{textAlign:"center",padding:"14px 0"}}>
      <div style={{display:"inline-block",animation:anim,cursor:ready?"pointer":"default",position:"relative"}} onClick={ready?onHatch:undefined}>
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:"180px",height:"180px",borderRadius:"50%",background:ready?"radial-gradient(circle,rgba(255,215,0,0.4),transparent 70%)":"radial-gradient(circle,"+color.glow+",transparent 70%)",filter:"blur(15px)",opacity:progress>0.3?Math.min(progress,1):0}}/>
        <div style={{width:"140px",height:"180px",background:color.bg,borderRadius:"50% 50% 50% 50% / 60% 60% 40% 40%",position:"relative",boxShadow:ready?"0 0 40px rgba(255,215,0,0.6), 0 10px 30px rgba(0,0,0,0.15), inset 0 -5px 15px rgba(0,0,0,0.05)":"0 10px 30px rgba(0,0,0,0.12), inset 0 -5px 15px rgba(0,0,0,0.05)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto"}}>
          <div style={{position:"absolute",top:"28%",left:"18%",width:"20px",height:"16px",borderRadius:"50%",background:color.spot,opacity:0.25}}/>
          <div style={{position:"absolute",top:"48%",right:"20%",width:"24px",height:"18px",borderRadius:"50%",background:color.spot,opacity:0.2}}/>
          <div style={{position:"absolute",bottom:"24%",left:"28%",width:"16px",height:"12px",borderRadius:"50%",background:color.spot,opacity:0.15}}/>
          {cracks}
          {progress>0.7&&<div style={{position:"absolute",top:"38%",left:"50%",transform:"translate(-50%,-50%)",fontSize:"32px",opacity:Math.min((progress-0.7)*3,0.9),animation:"pulse-text 1s infinite"}}>⚡</div>}
          <div style={{textAlign:"center",zIndex:1}}><div style={{fontSize:"34px",fontWeight:"900",color:"rgba(0,0,0,0.55)",textShadow:"0 1px 2px rgba(255,255,255,0.5)"}}>{stamps}/{target}</div></div>
        </div>
      </div>
      <div style={{margin:"14px auto 0",width:"170px",height:"14px",background:"rgba(0,0,0,0.06)",borderRadius:"7px",overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:"7px",width:(progress*100)+"%",background:ready?"linear-gradient(90deg,#FFD700,#FF6B35)":"linear-gradient(90deg,#4CAF50,#8BC34A)",transition:"width 0.5s ease"}}/>
      </div>
      {ready?(<div style={{marginTop:"12px",fontSize:"19px",fontWeight:"800",color:"#FF6B35",animation:"pulse-text 1s infinite",fontFamily:"'Hiragino Maru Gothic Pro',sans-serif"}}>🎉 タップして たまごを わろう！</div>)
      :(<div style={{marginTop:"10px",fontSize:"14px",color:"#999"}}>あと <b style={{color:"#FF6B35",fontSize:"18px"}}>{target-stamps}</b> スタンプで うまれるよ！</div>)}
    </div>
  );
}

// ==================== HATCH SCENE (GACHA STYLE) ====================
function HatchScene({creature,onComplete}){
  // Phases: 0=egg shake, 1=crack, 2=gacha ball color reveal, 3=creature reveal, 4=done
  var [phase,setPhase]=useState(0);
  var joyMsg=useRef(HATCH_MESSAGES[Math.floor(Math.random()*HATCH_MESSAGES.length)]);
  var isRare=creature.rarity>=2;var isSuperRare=creature.rarity>=3;
  var ballColor=isSuperRare?"linear-gradient(135deg,#FFD700,#FF6B35)":isRare?"linear-gradient(135deg,#4A90D9,#90CAF9)":"linear-gradient(135deg,#4CAF50,#81C784)";
  var rarityLabel=isSuperRare?"🌈 スーパーレア！！":isRare?"💎 レア！":"⭐ ノーマル";
  var rarityColor=isSuperRare?"#FF6B35":isRare?"#4A90D9":"#4CAF50";

  useEffect(function(){
    var t1=setTimeout(function(){setPhase(1);playGachaRoll();},800);
    var t2=setTimeout(function(){setPhase(3);playGachaReveal(isRare);},2200);
    var t3=setTimeout(function(){setPhase(4);},4000);
    return function(){clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
  },[]);

  var confetti=[];
  var emojis=isSuperRare?["🌈","⭐","✨","🌟","💫","🎊","👑","💎"]:isRare?["🎉","⭐","✨","🌟","💫"]:["🎉","⭐","✨"];
  var count=isSuperRare?35:isRare?25:15;
  for(var i=0;i<count;i++){confetti.push(<div key={i} style={{position:"fixed",left:(Math.random()*100)+"%",top:"-20px",fontSize:(16+Math.random()*22)+"px",animation:"confetti-fall "+(2+Math.random()*3)+"s linear "+Math.random()+"s forwards"}}>{emojis[Math.floor(Math.random()*emojis.length)]}</div>);}

  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,
      background:phase<2?"radial-gradient(circle,#1a1a2e,#0a0a15)":
        phase===2?"radial-gradient(circle,#111133,#0a0a20)":
        isSuperRare?"radial-gradient(circle,#FFF8E1 0%,#FFE082 30%,#FFCC80 60%,#FFB74D 100%)":
        isRare?"radial-gradient(circle,#E3F2FD,#BBDEFB,#90CAF9)":
        "radial-gradient(circle,#E8F5E9,#C8E6C9)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",transition:"background 0.8s ease"}}>

      {/* Phase 0-1: Egg shaking and cracking */}
      {phase<3&&(
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:"130px",animation:phase===0?"shake-hard 0.2s infinite":"egg-crack 0.8s forwards"}}>🥚</div>
          {phase===1&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:"70px",animation:"flash 0.3s infinite"}}>💥</div>}
        </div>
      )}

      {/* Phase 3+: Creature reveal */}
      {phase>=3&&(
        <div style={{textAlign:"center",animation:"appear-bounce 0.8s ease-out",position:"relative",zIndex:2}}>
          <div style={{fontSize:"140px",marginBottom:"10px",
            filter:isSuperRare?"drop-shadow(0 0 40px rgba(255,215,0,0.8))":isRare?"drop-shadow(0 0 20px rgba(74,144,217,0.6))":"drop-shadow(0 0 10px rgba(0,0,0,0.1))"
          }}>{creature.emoji}</div>
          {isSuperRare&&<div style={{fontSize:"16px",color:"#FF6B35",fontWeight:"800",animation:"pulse-text 1s infinite",marginBottom:"4px"}}>⭐ スーパーレア！ ⭐</div>}
          {isRare&&!isSuperRare&&<div style={{fontSize:"16px",color:"#4A90D9",fontWeight:"800",animation:"pulse-text 1s infinite",marginBottom:"4px"}}>💎 レア！</div>}
          <div style={{fontSize:"34px",fontWeight:"900",color:"#1a1a2e",fontFamily:"'Hiragino Maru Gothic Pro',sans-serif"}}>{creature.name}</div>
          <div style={{marginTop:"4px"}}><Stars r={creature.rarity}/></div>
          <div style={{marginTop:"6px",fontSize:"17px",color:"#666"}}>が うまれたよ！</div>
          <div style={{marginTop:"16px",fontSize:"19px",fontWeight:"800",color:"#FF6B35",maxWidth:"340px",lineHeight:"1.7",fontFamily:"'Hiragino Maru Gothic Pro',sans-serif",animation:"pulse-text 2s infinite",wordBreak:"keep-all",overflowWrap:"break-word"}}>{joyMsg.current}</div>
          {confetti}
        </div>
      )}

      {phase>=4&&(<button onClick={onComplete} style={{marginTop:"30px",background:isSuperRare?"linear-gradient(135deg,#FFD700,#FF6B35)":isRare?"linear-gradient(135deg,#4A90D9,#5BA3EC)":"linear-gradient(135deg,#4CAF50,#66BB6A)",color:"#fff",border:"none",borderRadius:"50px",padding:"16px 44px",fontSize:"21px",fontWeight:"800",cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,0.3)",animation:"appear-bounce 0.5s ease-out"}}>ずかんに とうろく！</button>)}
    </div>
  );
}

// ==================== TIMER ====================
function TimerOverlay({seconds,label,onComplete,onCancel}){
  var [left,setLeft]=useState(seconds);
  var [running,setRunning]=useState(true);
  var total=seconds;
  useEffect(function(){
    if(!running)return;
    if(left<=0){playTimerDone();onComplete();return;}
    var t=setTimeout(function(){setLeft(left-1);},1000);
    return function(){clearTimeout(t);};
  },[left,running]);
  var pct=(total-left)/total;
  var mm=String(Math.floor(left/60)).padStart(2,"0");
  var ss=String(left%60).padStart(2,"0");
  var r=70,circ=2*Math.PI*r;
  return (
    <div style={{position:"fixed",inset:0,zIndex:900,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:"32px",padding:"36px 32px",textAlign:"center",maxWidth:"340px",width:"90%",boxShadow:"0 10px 40px rgba(0,0,0,0.3)"}}>
        <div style={{fontSize:"18px",fontWeight:"800",color:"#333",marginBottom:"20px",fontFamily:"'Hiragino Maru Gothic Pro',sans-serif"}}>{label}</div>
        <div style={{position:"relative",width:"160px",height:"160px",margin:"0 auto 20px"}}>
          <svg width="160" height="160" viewBox="0 0 160 160">
            <circle cx="80" cy="80" r={r} fill="none" stroke="#F0F0F0" strokeWidth="10"/>
            <circle cx="80" cy="80" r={r} fill="none" stroke={left<=10?"#E53935":"#4CAF50"} strokeWidth="10"
              strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
              transform="rotate(-90 80 80)" style={{transition:"stroke-dashoffset 1s linear"}}/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:left<=10?"48px":"44px",fontWeight:"900",fontFamily:"'SF Mono',monospace",color:left<=10?"#E53935":"#333",transition:"color 0.3s"}}>{mm}:{ss}</div>
          </div>
        </div>
        {left<=10&&left>0&&<div style={{fontSize:"28px",marginBottom:"12px",animation:"pulse-text 0.5s infinite"}}>⏰</div>}
        {left<=0&&<div style={{fontSize:"24px",fontWeight:"800",color:"#4CAF50",marginBottom:"12px",animation:"appear-bounce 0.5s"}}>⏰ じかんだよ！</div>}
        <div style={{display:"flex",gap:"10px",justifyContent:"center"}}>
          {left>0&&<button onClick={function(){setRunning(!running);}} style={{background:running?"#FF9800":"#4CAF50",color:"#fff",border:"none",borderRadius:"14px",padding:"12px 24px",fontSize:"16px",fontWeight:"700",cursor:"pointer"}}>{running?"⏸ ストップ":"▶️ スタート"}</button>}
          <button onClick={onCancel} style={{background:"#eee",border:"none",borderRadius:"14px",padding:"12px 24px",fontSize:"16px",fontWeight:"700",cursor:"pointer",color:"#666"}}>✕ とじる</button>
        </div>
      </div>
    </div>
  );
}

function Dashboard({state,onBack}){
  var [pin,setPin]=useState("");var [authed,setAuthed]=useState(false);
  if(!authed){
    return (
      <div style={{minHeight:"100vh",background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
        <div style={{background:"#fff",borderRadius:"24px",padding:"30px",textAlign:"center",boxShadow:"0 4px 20px rgba(0,0,0,0.1)",width:"100%",maxWidth:"320px"}}>
          <div style={{fontSize:"44px",marginBottom:"12px"}}>📊</div>
          <div style={{fontSize:"18px",fontWeight:"700",marginBottom:"16px"}}>ダッシュボード（おとなよう）</div>
          <input type="password" value={pin} onChange={function(e){setPin(e.target.value);}} placeholder="1234"
            style={{width:"120px",textAlign:"center",fontSize:"28px",padding:"10px",borderRadius:"12px",border:"2px solid #ddd",outline:"none",letterSpacing:"8px"}}
            onKeyDown={function(e){if(e.key==="Enter"&&pin==="1234")setAuthed(true);}}/>
          <div style={{marginTop:"12px",display:"flex",gap:"8px",justifyContent:"center"}}>
            <button onClick={onBack} style={{background:"#eee",border:"none",borderRadius:"12px",padding:"10px 20px",fontSize:"16px",cursor:"pointer"}}>もどる</button>
            <button onClick={function(){if(pin==="1234")setAuthed(true);}} style={{background:"#4A90D9",color:"#fff",border:"none",borderRadius:"12px",padding:"10px 20px",fontSize:"16px",fontWeight:"700",cursor:"pointer"}}>OK</button>
          </div>
        </div>
      </div>
    );
  }
  // Calculate weekly stats
  var dates=state.completedDates||[];
  var now=new Date();
  var weeks=[];
  for(var w=0;w<4;w++){
    var weekDates=[];var count=0;
    for(var d=0;d<7;d++){
      var day=new Date(now);day.setDate(day.getDate()-(w*7+d));
      var str=ds(day);weekDates.push(str);
      if(dates.indexOf(str)>=0)count++;
    }
    var end=new Date(now);end.setDate(end.getDate()-w*7);
    var start=new Date(now);start.setDate(start.getDate()-w*7-6);
    weeks.push({count:count,label:(start.getMonth()+1)+"/"+start.getDate()+"〜"+(end.getMonth()+1)+"/"+end.getDate()});
  }
  weeks.reverse();
  // Stamp history
  var sh=state.stampHistory||[];
  var recentStamps=sh.slice(-14);
  var maxS=Math.max.apply(null,recentStamps.map(function(s){return s.stamps;}).concat([5]));
  return (
    <div style={{minHeight:"100vh",background:"#F5F5F5",padding:"20px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px"}}>
        <button onClick={onBack} style={{background:"#fff",border:"none",borderRadius:"50%",width:"44px",height:"44px",fontSize:"22px",cursor:"pointer"}}>←</button>
        <h2 style={{margin:0,fontSize:"22px",fontWeight:"800"}}>📊 おやダッシュボード</h2>
      </div>
      {/* Summary */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"20px"}}>
        <div style={{background:"#fff",borderRadius:"18px",padding:"16px",textAlign:"center"}}>
          <div style={{fontSize:"12px",color:"#999"}}>トータル スタンプ</div>
          <div style={{fontSize:"28px",fontWeight:"900",color:"#FF6B35"}}>⭐ {state.totalStamps}</div>
        </div>
        <div style={{background:"#fff",borderRadius:"18px",padding:"16px",textAlign:"center"}}>
          <div style={{fontSize:"12px",color:"#999"}}>さいだい れんぞく</div>
          <div style={{fontSize:"28px",fontWeight:"900",color:"#FF9800"}}>🔥 {state.streakDays}にち</div>
        </div>
        <div style={{background:"#fff",borderRadius:"18px",padding:"16px",textAlign:"center"}}>
          <div style={{fontSize:"12px",color:"#999"}}>ずかん しゅうりつ</div>
          <div style={{fontSize:"28px",fontWeight:"900",color:"#5D4037"}}>📖 {Math.round(state.collected.length/32*100)}%</div>
        </div>
        <div style={{background:"#fff",borderRadius:"18px",padding:"16px",textAlign:"center"}}>
          <div style={{fontSize:"12px",color:"#999"}}>バッジ</div>
          <div style={{fontSize:"28px",fontWeight:"900",color:"#FFD700"}}>🏅 {(state.unlockedBadges||[]).length}/{BADGES.length}</div>
        </div>
      </div>
      {/* Weekly chart */}
      <div style={{background:"#fff",borderRadius:"20px",padding:"20px",marginBottom:"20px"}}>
        <div style={{fontSize:"16px",fontWeight:"800",marginBottom:"14px",color:"#333"}}>📈 しゅうかん たっせいりつ</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:"8px",height:"120px",paddingBottom:"24px",position:"relative"}}>
          {weeks.map(function(wk,i){
            var pct=Math.round(wk.count/7*100);
            return (
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%",position:"relative"}}>
                <div style={{fontSize:"13px",fontWeight:"800",color:pct>=80?"#4CAF50":pct>=50?"#FF9800":"#E57373",marginBottom:"4px"}}>{pct}%</div>
                <div style={{width:"100%",maxWidth:"50px",borderRadius:"8px 8px 4px 4px",
                  background:pct>=80?"linear-gradient(180deg,#4CAF50,#66BB6A)":pct>=50?"linear-gradient(180deg,#FF9800,#FFB74D)":"linear-gradient(180deg,#E57373,#EF9A9A)",
                  height:Math.max(pct*0.9,4)+"%",transition:"height 0.5s ease",
                  boxShadow:"0 2px 8px rgba(0,0,0,0.1)",
                }}/>
                <div style={{fontSize:"10px",color:"#999",marginTop:"4px",textAlign:"center",position:"absolute",bottom:"-20px"}}>{wk.label}</div>
              </div>
            );
          })}
        </div>
      </div>
      {/* Stamp trend */}
      {recentStamps.length>0&&(
        <div style={{background:"#fff",borderRadius:"20px",padding:"20px"}}>
          <div style={{fontSize:"16px",fontWeight:"800",marginBottom:"14px",color:"#333"}}>📊 スタンプ すいい（14にち）</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:"3px",height:"80px"}}>
            {recentStamps.map(function(s,i){
              var h=Math.max(s.stamps/maxS*100,5);
              return (
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%"}}>
                  <div style={{fontSize:"9px",color:"#999",marginBottom:"2px"}}>{s.stamps}</div>
                  <div style={{width:"100%",borderRadius:"4px 4px 2px 2px",
                    background:"linear-gradient(180deg,#FF6B35,#FFB300)",height:h+"%",
                    transition:"height 0.3s",minHeight:"3px",
                  }}/>
                  <div style={{fontSize:"8px",color:"#bbb",marginTop:"2px"}}>{s.date.slice(5)}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ==================== DAILY QUIZ ====================
function DailyQuiz({onClose,onCorrect,onWrong}){
  var now=new Date();
  var key=(now.getMonth()+1)+"-"+now.getDate();
  var quiz=DAILY_QUIZ[key];
  var [selected,setSelected]=useState(null);
  var [answered,setAnswered]=useState(false);

  if(!quiz){
    return (
      <div style={{position:"fixed",inset:0,zIndex:850,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
        <div style={{background:"#fff",borderRadius:"28px",padding:"28px",textAlign:"center",maxWidth:"360px",width:"100%"}}>
          <div style={{fontSize:"50px",marginBottom:"12px"}}>🧠</div>
          <div style={{fontSize:"18px",fontWeight:"800",color:"#333"}}>きょうの クイズは おやすみ！</div>
          <button onClick={onClose} style={{marginTop:"16px",background:"#eee",border:"none",borderRadius:"14px",padding:"12px 28px",fontSize:"16px",fontWeight:"700",cursor:"pointer"}}>とじる</button>
        </div>
      </div>
    );
  }

  var question=quiz[0];var choices=quiz[1];var correct=quiz[2];
  var isCorrect=selected===correct;

  function handleSelect(idx){
    if(answered)return;
    setSelected(idx);setAnswered(true);
    if(idx===correct){playQuizCorrect();onCorrect();setTimeout(function(){speak("せいかい！すごいね ときのすけくん！");},500);}
    else{playQuizWrong();if(onWrong)onWrong();setTimeout(function(){speak("ざんねん！こたえは "+choices[correct]+" だよ");},500);}
  }

  return (
    <div style={{position:"fixed",inset:0,zIndex:850,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{background:"#fff",borderRadius:"28px",padding:"28px 24px",maxWidth:"380px",width:"100%",boxShadow:"0 10px 40px rgba(0,0,0,0.2)",animation:"appear-bounce 0.4s ease-out"}}>
        {/* Header */}
        <div style={{textAlign:"center",marginBottom:"16px"}}>
          <div style={{fontSize:"44px",marginBottom:"6px",animation:answered?(isCorrect?"appear-bounce 0.4s":"shake-medium 0.5s"):""}}>
            {answered?(isCorrect?"🎉":"😢"):"🧠"}
          </div>
          <div style={{fontSize:"13px",color:"#999",fontWeight:"600"}}>きょうの クイズ</div>
        </div>

        {/* Question */}
        <div style={{
          background:"linear-gradient(135deg,#E3F2FD,#BBDEFB)",borderRadius:"18px",
          padding:"16px 18px",marginBottom:"18px",
          fontSize:"18px",fontWeight:"800",lineHeight:"1.7",color:"#1565C0",
          fontFamily:"'Hiragino Maru Gothic Pro',sans-serif",
          wordBreak:"keep-all",overflowWrap:"break-word",
          display:"flex",alignItems:"flex-start",gap:"8px",
        }}>
          <div style={{flex:1}}>{question}</div>
          <button onClick={function(){speak(question);}}
            style={{flexShrink:0,background:"rgba(21,101,192,0.15)",border:"none",borderRadius:"50%",width:"34px",height:"34px",fontSize:"17px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginTop:"2px"}}>
            🔊
          </button>
        </div>

        {/* Choices */}
        <div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"18px"}}>
          {choices.map(function(ch,i){
            var isSel=selected===i;
            var isCorr=i===correct;
            var bg="#F5F5F5";var border="2px solid transparent";var color="#333";
            if(answered){
              if(isCorr){bg="linear-gradient(135deg,#E8F5E9,#C8E6C9)";border="2px solid #4CAF50";color="#2E7D32";}
              else if(isSel&&!isCorr){bg="linear-gradient(135deg,#FFEBEE,#FFCDD2)";border="2px solid #E53935";color="#C62828";}
              else{bg="#F5F5F5";color="#bbb";}
            }
            return (
              <button key={i} onClick={function(){handleSelect(i);}}
                style={{
                  background:bg,border:border,borderRadius:"16px",padding:"14px 18px",
                  fontSize:"17px",fontWeight:"700",color:color,cursor:answered?"default":"pointer",
                  textAlign:"left",fontFamily:"'Hiragino Maru Gothic Pro',sans-serif",
                  transition:"all 0.3s",transform:isSel&&answered?"scale(0.97)":"scale(1)",
                  display:"flex",alignItems:"center",gap:"10px",
                }}>
                <div style={{
                  width:"28px",height:"28px",borderRadius:"50%",flexShrink:0,
                  background:answered&&isCorr?"#4CAF50":answered&&isSel?"#E53935":"#E0E0E0",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:"14px",color:"#fff",fontWeight:"900",
                }}>
                  {answered&&isCorr?"○":answered&&isSel?"✕":String.fromCharCode(65+i)}
                </div>
                <span>{ch}</span>
              </button>
            );
          })}
        </div>

        {/* Result */}
        {answered&&(
          <div style={{textAlign:"center"}}>
            <div style={{
              fontSize:"17px",fontWeight:"800",marginBottom:"14px",
              color:isCorrect?"#4CAF50":"#FF6B35",lineHeight:"1.6",
              fontFamily:"'Hiragino Maru Gothic Pro',sans-serif",
            }}>
              {isCorrect?"せいかい！すごいね ときのすけくん！ +1⭐":"ざんねん！こたえは「"+choices[correct]+"」だよ。おぼえておこうね！"}
            </div>
            <button onClick={onClose} style={{
              background:isCorrect?"linear-gradient(135deg,#4CAF50,#66BB6A)":"linear-gradient(135deg,#FF6B35,#FF8E53)",
              color:"#fff",border:"none",borderRadius:"16px",padding:"12px 32px",
              fontSize:"17px",fontWeight:"800",cursor:"pointer",
              boxShadow:"0 4px 15px "+(isCorrect?"rgba(76,175,80,0.3)":"rgba(255,107,53,0.3)"),
            }}>
              {isCorrect?"やったね！":"つぎは がんばろう！"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ==================== MY ROOM ====================
function MyRoom({collected,onBack}){
  var [selectedIdx,setSelectedIdx]=useState(null);
  // Generate random positions for creatures
  var positions=useRef(null);
  if(!positions.current||positions.current.length!==collected.length){
    var pos=[];
    for(var i=0;i<collected.length;i++){
      pos.push({
        x:10+Math.random()*70,
        y:15+Math.random()*50,
        delay:(Math.random()*3).toFixed(1),
        size:36+Math.floor(Math.random()*20),
      });
    }
    positions.current=pos;
  }
  var selected=selectedIdx!==null?collected[selectedIdx]:null;
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#87CEEB 0%,#B0E0E6 30%,#90EE90 60%,#7CCD7C 80%,#6B8E23 100%)",position:"relative",overflow:"hidden"}}>

      <div style={{position:"absolute",top:"8%",right:"20%",fontSize:"24px",animation:"egg-float 5s ease-in-out 1s infinite",opacity:0.5}}>☁️</div>
      <div style={{position:"absolute",top:"3%",left:"50%",fontSize:"36px",animation:"egg-float 6s ease-in-out 2s infinite",opacity:0.4}}>☁️</div>
      <div style={{position:"absolute",top:"2%",right:"10%",fontSize:"22px"}}>🌤️</div>

function AllClearOverlay({onDone}){
  var msg=ALLCLEAR_MESSAGES[Math.floor(Math.random()*ALLCLEAR_MESSAGES.length)];
  useEffect(function(){var t=setTimeout(onDone,3500);return function(){clearTimeout(t);};},[]);
  var confetti=[];for(var i=0;i<15;i++){confetti.push(<div key={i} style={{position:"fixed",left:(Math.random()*100)+"%",top:"-10px",fontSize:(14+Math.random()*16)+"px",animation:"confetti-fall "+(2+Math.random()*2)+"s linear "+Math.random()*0.5+"s forwards"}}>{["🎉","⭐","✨","🎊","💪"][Math.floor(Math.random()*5)]}</div>);}
  return (
    <div style={{position:"fixed",inset:0,zIndex:800,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(5px)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      {confetti}
      <div style={{background:"#fff",borderRadius:"28px",padding:"32px 28px",textAlign:"center",maxWidth:"340px",animation:"appear-bounce 0.5s ease-out",boxShadow:"0 10px 40px rgba(0,0,0,0.2)"}}>
        <div style={{fontSize:"60px",marginBottom:"12px"}}>🏆</div>
        <div style={{fontSize:"20px",fontWeight:"800",color:"#FF6B35",lineHeight:"1.6",fontFamily:"'Hiragino Maru Gothic Pro',sans-serif"}}>{msg}</div>
      </div>
    </div>
  );
}

// ==================== MAIN APP ====================
function TamagoHatch(){
  var [state,setState]=useState(null);
  var [screen,setScreen]=useState("home");
  var [hatching,setHatching]=useState(false);
  var [hatchCreature,setHatchCreature]=useState(null);
  var [loaded,setLoaded]=useState(false);
  var [toastMsg,setToastMsg]=useState(null);
  var [showAllClear,setShowAllClear]=useState(false);
  var [showEditor,setShowEditor]=useState(false);
  var [timerTask,setTimerTask]=useState(null);
  var [newBadge,setNewBadge]=useState(null);
  var [showQuiz,setShowQuiz]=useState(false);
  var toastTimer=useRef(null);var saveTimer=useRef(null);

  useEffect(function(){
    load().then(function(data){
      if(data){
        var today=ds();
        if(data.todayTasksDate!==today){
          // Record yesterday's stamps before resetting
          if(data.todayCompleted&&data.todayCompleted.length>0){
            var sh=data.stampHistory||[];
            sh.push({date:data.todayTasksDate,stamps:data.todayCompleted.length});
            if(sh.length>30)sh=sh.slice(-30);
            data.stampHistory=sh;
          }
          data.todayCompleted=[];data.todayTasksDate=today;
        }
        if(data.dailyNoteDate!==today){data.dailyNote="";data.dailyNoteDate=today;}
        if(!data.completedDates)data.completedDates=[];
        if(!data.presets)data.presets=DEFAULT_PRESETS;
        if(!data.unlockedBadges)data.unlockedBadges=[];
        if(!data.stampHistory)data.stampHistory=[];
        if(data.quizAnsweredDate===undefined)data.quizAnsweredDate=null;
        setState(data);
      }else{setState(mkDef());}
      setLoaded(true);
    });
  },[]);

  useEffect(function(){
    if(!loaded||!state)return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(function(){save(state);},300);
  },[state,loaded]);

  // Badge checker
  useEffect(function(){
    if(!state)return;
    var unlocked=state.unlockedBadges||[];
    var newUnlocked=unlocked.slice();
    var justGot=null;
    BADGES.forEach(function(b){
      if(newUnlocked.indexOf(b.id)<0&&b.check(state)){
        newUnlocked.push(b.id);
        justGot=b;
      }
    });
    if(newUnlocked.length>unlocked.length){
      setState(function(p){return Object.assign({},p,{unlockedBadges:newUnlocked});});
      if(justGot){
        playBadgeSound();
        setNewBadge(justGot);
        setTimeout(function(){setNewBadge(null);},3500);
      }
    }
  },[state&&state.totalStamps,state&&state.streakDays,state&&state.collected.length,state&&(state.completedDates||[]).length]);

  var up=useCallback(function(c){setState(function(p){return Object.assign({},p,c);});},[]);

  if(!loaded||!state){
    return (<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(180deg,#E8F5E9,#FFF8E1)",gap:"16px"}}><div style={{fontSize:"70px",animation:"egg-float 2s ease-in-out infinite"}}>🥚</div><div style={{fontSize:"18px",fontWeight:"900",color:"#5D4037",fontFamily:"'Hiragino Maru Gothic Pro',sans-serif",animation:"pulse-text 1.5s infinite",textAlign:"center",lineHeight:"1.6"}}>がんばれ！<br/>ときのすけくんせんよう<br/>たまごっち</div><div style={{fontSize:"13px",color:"#999"}}>よみこみちゅう...</div></div>);
  }

  var todayTasks=state.todayTasks||[];
  var allDone=todayTasks.length>0&&todayTasks.every(function(t){return state.todayCompleted.indexOf(t.id)>=0;});

  function handleToggle(taskId){
    var today=ds();var completed=state.todayCompleted.slice();
    var stamps=state.currentEggStamps;var total=state.totalStamps;
    var idx=completed.indexOf(taskId);
    if(idx>=0){completed.splice(idx,1);stamps=Math.max(0,stamps-1);total=Math.max(0,total-1);}
    else{
      completed.push(taskId);stamps+=1;total+=1;
      playTaskSound();
      var msg=TASK_MESSAGES[Math.floor(Math.random()*TASK_MESSAGES.length)];
      setToastMsg(msg);if(toastTimer.current)clearTimeout(toastTimer.current);
      toastTimer.current=setTimeout(function(){setToastMsg(null);},2500);
    }
    var wasAll=todayTasks.length>0&&todayTasks.every(function(t){return state.todayCompleted.indexOf(t.id)>=0;});
    var isAll=todayTasks.length>0&&todayTasks.every(function(t){return completed.indexOf(t.id)>=0;});
    if(isAll&&!wasAll){stamps+=2;total+=2;playAllClearSound();setShowAllClear(true);}
    else if(!isAll&&wasAll){stamps=Math.max(0,stamps-2);total=Math.max(0,total-2);}
    var streak=state.streakDays;var dates=state.completedDates?state.completedDates.slice():[];
    if(isAll&&state.lastCompletedDate!==today){
      var y=new Date();y.setDate(y.getDate()-1);
      streak=(state.lastCompletedDate===ds(y))?streak+1:1;
      var sb=streakBonus(streak);if(sb>0){stamps+=sb;total+=sb;}
      if(dates.indexOf(today)<0)dates.push(today);
    }
    // Update stamp history for today
    var sh=(state.stampHistory||[]).slice();
    var todayEntry=sh.findIndex(function(s){return s.date===today;});
    var todayStampCount=completed.length;
    if(todayEntry>=0){sh[todayEntry]={date:today,stamps:todayStampCount};}
    else{sh.push({date:today,stamps:todayStampCount});if(sh.length>30)sh=sh.slice(-30);}
    up({todayCompleted:completed,currentEggStamps:stamps,totalStamps:total,streakDays:streak,lastCompletedDate:isAll?today:state.lastCompletedDate,completedDates:dates,stampHistory:sh});
  }

  function handleHatch(){playHatchSound();setHatchCreature(state.currentCreature);setHatching(true);}
  function handleHatchDone(){
    var nc=state.collected.concat([Object.assign({},hatchCreature,{date:ds()})]);
    var next=pick(nc);
    up({currentEggStamps:state.currentEggStamps-state.currentEggTarget,currentEggTarget:next.cost,currentCreature:next,eggColorIndex:(state.eggColorIndex+1)%EGG_COLORS.length,collected:nc});
    setHatching(false);setHatchCreature(null);
  }

  function handleSaveTasks(newTasks){
    var newLabels=new Set(newTasks.map(function(t){return t.label;}));
    var newCompleted=state.todayCompleted.filter(function(id){
      var task=todayTasks.find(function(t){return t.id===id;});
      return task&&newLabels.has(task.label);
    });
    var completedLabels=new Set(newCompleted.map(function(id){
      var task=todayTasks.find(function(t){return t.id===id;});
      return task?task.label:null;
    }));
    var finalCompleted=newTasks.filter(function(t){return completedLabels.has(t.label);}).map(function(t){return t.id;});
    up({todayTasks:newTasks,todayTasksDate:ds(),todayCompleted:finalCompleted});
  }

  if(hatching&&hatchCreature)return <HatchScene creature={hatchCreature} onComplete={handleHatchDone}/>;
  if(screen==="zukan")return <Zukan collected={state.collected} onBack={function(){setScreen("home");}}/>;
  if(screen==="myroom")return <MyRoom collected={state.collected} onBack={function(){setScreen("home");}}/>;
  if(screen==="badges")return <BadgeScreen unlockedBadges={state.unlockedBadges} onBack={function(){setScreen("home");}}/>;
  if(screen==="dashboard")return <Dashboard state={state} onBack={function(){setScreen("home");}}/>;
  if(screen==="settings")return (<Settings onBack={function(){setScreen("home");}} onReset={function(){setState(mkDef());setScreen("home");}}/>);

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#E8F5E9 0%,#FFF8E1 40%,#FFF3E0 70%,#FFECB3 100%)",padding:"16px",fontFamily:"'Hiragino Maru Gothic Pro','Rounded Mplus 1c',-apple-system,sans-serif",maxWidth:"600px",margin:"0 auto",overflow:"hidden",boxSizing:"border-box",width:"100%"}}>
      <style>{"@keyframes egg-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}@keyframes shake-soft{0%,100%{transform:rotate(0)}25%{transform:rotate(1.5deg)}75%{transform:rotate(-1.5deg)}}@keyframes shake-medium{0%,100%{transform:rotate(0)}20%{transform:rotate(3deg)}40%{transform:rotate(-3deg)}60%{transform:rotate(2deg)}80%{transform:rotate(-2deg)}}@keyframes shake-hard{0%,100%{transform:rotate(0) scale(1)}10%{transform:rotate(5deg) scale(1.02)}20%{transform:rotate(-5deg) scale(1.02)}30%{transform:rotate(5deg) scale(1.01)}40%{transform:rotate(-5deg) scale(1.01)}50%{transform:rotate(4deg) scale(1.02)}60%{transform:rotate(-4deg) scale(1.02)}70%{transform:rotate(3deg) scale(1.01)}80%{transform:rotate(-3deg) scale(1.01)}90%{transform:rotate(2deg) scale(1)}}@keyframes glow-pulse{0%,100%{filter:drop-shadow(0 0 10px rgba(255,215,0,.3))}50%{filter:drop-shadow(0 0 25px rgba(255,215,0,.7))}}@keyframes pulse-text{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.03)}}@keyframes appear-bounce{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}@keyframes egg-crack{0%{transform:scale(1)}30%{transform:scale(1.2)}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(0);opacity:0}}@keyframes flash{0%,100%{opacity:.3}50%{opacity:1}}@keyframes confetti-fall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}@keyframes toast-appear{0%{opacity:0;transform:translateX(-50%) translateY(30px) scale(.8)}100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}@keyframes spin-slow{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}@keyframes badge-pop{0%{opacity:0;transform:translateX(-50%) scale(0.3)}40%{transform:translateX(-50%) scale(1.15)}100%{opacity:1;transform:translateX(-50%) scale(1)}}@keyframes fade-up{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}*{-webkit-tap-highlight-color:transparent}button:active{transform:scale(0.96)!important;transition:transform 0.1s}"}</style>

      <InfoBar dailyNote={state.dailyNote} onNoteChange={function(n){up({dailyNote:n,dailyNoteDate:ds()});}} onSettingsClick={function(){setScreen("settings");}} streakDays={state.streakDays}/>

      <div style={{display:"flex",gap:"8px",marginBottom:"16px",flexWrap:"wrap",animation:"fade-up 0.4s ease-out"}}>

          <div style={{fontSize:"10px",color:"#999",fontWeight:"600"}}>スタンプ</div>

          <div style={{fontSize:"22px",fontWeight:"900",color:state.streakDays>=7?"#FF6B35":state.streakDays>=3?"#FF9800":"#4CAF50"}}>🔥 {state.streakDays}</div>

          <div style={{fontSize:"10px",color:"#999",fontWeight:"600"}}>なかま</div>
          <div style={{fontSize:"22px",fontWeight:"900",color:"#5D4037"}}>🏠 {state.collected.length}</div>
        </div>

          <div style={{fontSize:"10px",color:"#999",fontWeight:"600"}}>バッジ</div>
          <div style={{fontSize:"22px",fontWeight:"900",color:"#FFD700"}}>🏅 {(state.unlockedBadges||[]).length}</div>
        </div>
        <div onClick={function(){setScreen("dashboard");}} style={{flex:"1 1 0",minWidth:"70px",background:"#fff",borderRadius:"18px",padding:"12px 8px",textAlign:"center",cursor:"pointer",boxShadow:"0 2px 10px rgba(0,0,0,0.05)"}}>

          <div style={{fontSize:"22px",fontWeight:"900",color:"#4A90D9"}}>📊</div>
        </div>

      <div style={{background:"#fff",borderRadius:"28px",padding:"20px",marginBottom:"16px",boxShadow:"0 4px 20px rgba(0,0,0,0.06)",animation:"fade-up 0.5s ease-out"}}>

      {(function(){

      {showQuiz&&<DailyQuiz onClose={function(){setShowQuiz(false);}} onCorrect={function(){
        var stamps=state.currentEggStamps+1;var total=state.totalStamps+1;
        up({quizAnsweredDate:ds(),currentEggStamps:stamps,totalStamps:total});
      }} onWrong={function(){
        up({quizAnsweredDate:ds()});
      }}/>}
      {newBadge&&(
        <div style={{position:"fixed",top:"80px",left:"50%",transform:"translateX(-50%)",zIndex:700,background:"linear-gradient(135deg,#FFD700,#FFA000)",borderRadius:"20px",padding:"16px 24px",boxShadow:"0 8px 30px rgba(255,215,0,0.5)",animation:"badge-pop 0.5s ease-out",display:"flex",alignItems:"center",gap:"12px",maxWidth:"90%"}}>
          <div style={{fontSize:"36px"}}>{newBadge.emoji}</div>
          <div>
            <div style={{fontSize:"12px",color:"rgba(255,255,255,0.8)",fontWeight:"700"}}>🏅 バッジ ゲット！</div>
            <div style={{fontSize:"18px",fontWeight:"900",color:"#fff"}}>{newBadge.name}</div>
            <div style={{fontSize:"13px",color:"rgba(255,255,255,0.9)"}}>{newBadge.desc}</div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(React.createElement(TamagoHatch),document.getElementById("root"));
</script>
</body>
</html>
